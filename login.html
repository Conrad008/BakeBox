<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeBox | Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors:{
                        primaryPalette: '#FDFBF7',  
                        secondaryPalette: '#2D221E',
                        thirdPalette: '#D97706',
                        softBrown: '#78350F'
                    },

                    fontFamily: {
                        customFont: ['Georgia', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-primaryPalette font-customFont min-h-screen flex flex-col justify-between text-secondaryPalette bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-amber-100 via-orange-50 to-primaryPalette">
    <header class="p-4 sm:p-6 z-10">
        <a href="index.html" class="text-xl sm:text-2xl font-bold tracking-wide text-softBrown hover:text-thirdPalette transition-colors duration-300">
            BakeBox<span class="text-thirdPalette">.</span>
        </a>

    </header>

    <main class="flex-grow flex items-center justify-center px-3 sm:px-6 lg:px-8 z-10 my-4">
        <div class="max-w-md w-full space-y-6 sm:space-y-8 bg-white/40 backdrop-blur-md p-5 sm:p-8 rounded-2xl border border-white/40 shadow-xl shadow-stone-200/50">
            <div class="text-center">
                <h2 class="text-2xl sm:text-3xl font-bold tracking-tight text-secondaryPalette">
                    Welcome Back to Box
                </h2>

                <p class="mt-1.5 text-xs sm:text-sm text-stone-600 italic">
                    Fresh pastries are just a login away.
                </p>

            </div>

            <form id="loginForm" class="mt-6 sm:mt-8 space-y-5 sm:space-y-6">
                <div class="space-y-4 rounded-md">
                    <div>
                        <label for="email" class="block text-xs sm:text-sm font-bold text-stone-700 mb-1">Enter Your Email Address</label>
                        <input type="email" name="email" id="email" placeholder="Your email address" 
                        class="relative block w-full px-3 py-2 sm:py-2.5 bg-white/60 border border-white/50 placeholder-stone-400 
                        text-secondaryPalette rounded-xl focus:outline-none focus:ring-2 
                        focus:ring-thirdPalette focus:border-thirdPalette focus:bg-white text-sm 
                        transition-all">
                    </div>

                    <div>
                        <label for="password" class="block text-xs sm:text-sm font-bold text-stone-700 mb-1">Enter Your Password</label>
                        <input type="password" id="password" name="password" required placeholder="your password"
                        class="relative block w-full px-3 py-2 sm:py-2.5 bg-white/60 border border-white/50 placeholder-stone-400 
                        text-secondaryPalette rounded-xl focus:outline-none focus:ring-2 
                        focus:ring-thirdPalette focus:border-thirdPalette focus:bg-white text-sm 
                        transition-all">
                    </div>

                </div>

            </form>

        </div>

    </main>

    
</body>
</html>
