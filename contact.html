<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeBox | contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                primaryPalette: '#fdfbf7',   
                secondaryPalette: '#2c1e11',
                thirdPalette: '#d97706',   
              },
              fontFamily: {
                customFont: ['Georgia', 'Times New Roman', 'serif'],
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-primaryPalette text-secondaryPalette min-h-screen flex flex-col font-sans">
    <header class="sticky top-0 z-50 flex items-center justify-between px-6 md:px-12 py-4 bg-white shadow-sm border-b border-stone-200">
        <div class="text-4xl font-bold font-customFont text-secondaryPalette">
            <a href="home.html">BakeBox<span class="text-thirdPalette">.</span></a>
        </div>

        <nav class="hidden md:flex items-center gap-8 font-medium text-stone-600">
            <a href="home.html" class="hover:text-thirdPalette transition-colors">Home</a>
            <a href="products.html" class="hover:text-thirdPalette transition-colors">Our products</a>
            <a href="about.html" class="hover:text-thirdPalette transition-colors">About Us</a>
        </nav>

        <div class="hidden md:flex items-center gap-6 font-medium">
            <a href="cart.html" class="relative text-secondaryPalette hover:text-thirdPalette transition-colors text-xl p-1" aria-label="View Cart">
                <i class="fa-solid fa-basket-shopping"></i>
                <span id="cartCountBadge" class="absolute -top-1 -right-2 bg-thirdPalette text-white text-[10px] font-black w-4 h-4 rounded-full flex items-center justify-center border border-white hidden">0</span>
            </a>
        </div>

        <button id="mobileMenuBtn" class="md:hidden text-secondaryPalette p-2 focus:outline-none">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div id="mobileMenuDrawer" class="hidden md:hidden border-t border-stone-100 bg-white px-6 py-4 space-y-4 font-medium shadow-inner animate-fadeIn">
            <a href="home.html" class="hover:text-thirdPalette transition-colors">Home</a>
            <a href="products.html" class="hover:text-thirdPalette transition-colors">Our products</a>
            <a href="about.html" class="hover:text-thirdPalette transition-colors">About Us</a>
            
            <div class="pt-4 border-t border-stone-100 flex flex-col gap-3">
                <a href="cart.html" class="text-center bg-thirdPalette text-white py-2 rounded-md"><i class="fa-solid fa-basket-shopping mr-2"></i>View Cart</a>
            </div>
        </div>

    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-6 md:px-12 py-12 md:py-20 space-y-12 animate-fadeIn">
        <div class="text-center space-y-4">
            <span class="inline-block bg-amber-100 text-amber-800 text-xs tracking-widest uppercase font-semibold px-3 py-1 rounded-full">
                Get In Touch
            </span>
            <h1 class="text-4xl md:text-5xl font-bold font-customFont text-secondaryPalette">
                Connect With <span class="text-thirdPalette italic">Our Bakery</span>
            </h1>
            <p class="max-w-xl mx-auto text-stone-600 text-sm md:text-base leading-relaxed">
                Have an inquiry about wholesale distribution, special custom event catering orders, 
                or just want to chat about pastries? Drop us a line.
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start pt-4">
            <div class="bg-white border border-stone-200 p-6 md:p-8 rounded-2xl shadow-sm space-y-6">
                <h2 class="text-xl font-bold font-customFont text-stone-800 border-b border-stone-100 pb-3">
                    Send Us A Message
                </h2>

                <form id="contactForm" class="space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-stone-500 mb-1">Your Full Name</label>
                            <input type="text" required class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2.5 text-sm focus:ring-1 focus:ring-thirdPalette focus:border-thirdPalette outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-stone-500 mb-1">Email Address</label>
                            <input type="email" required class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2.5 text-sm focus:ring-1 focus:ring-thirdPalette focus:border-thirdPalette outline-none">
                        </div>
                    </div>
                </form>

            </div>

        </div>

    </main>
    
</body>
</html>
