<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeBox | Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                primaryPalette: '#fdfbf7',   
                secondaryPalette: '#2c1e11',
                thirdPalette: '#d97706',   
              },
              fontFamily: {
                customFont: ['Georgia', 'Times New Roman', 'serif'],
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-primaryPalette text-secondaryPalette min-h-screen flex flex-col font-sans">
    <header class="sticky top-0 z-50 flex items-center justify-between px-6 md:px-12 py-4 bg-white shadow-sm border-b border-stone-200">
        <div class="text-4xl font-bold font-customFont text-secondaryPalette">
            <a href="index.html">BakeBox<span class="text-thirdPalette">.</span></a>
        </div>

        <nav class="hidden md:flex items-center gap-8 font-medium text-stone-600">
            <a href="home.html" class="hover:text-thirdPalette transition-colors">Home</a>
            <a href="about.html" class="hover:text-thirdPalette transition-colors">About Us</a>
            <a href="contact.html" class="hover:text-thirdPalette transition-colors">Find Us</a>
        </nav>

        <div class="hidden md:flex items-center gap-6 font-medium">
            <a href="login.html" class="text-secondaryPalette hover:text-thirdPalette transition-colors">Login</a>
            <a href="cart.html" class="relative text-secondaryPalette hover:text-thirdPalette transition-colors text-xl p-1" aria-label="View Cart">
                <i class="fa-solid fa-basket-shopping"></i>
                <span id="cartCountBadge" class="absolute -top-1 -right-2 bg-thirdPalette text-white text-[10px] font-black w-4 h-4 rounded-full flex items-center justify-center border border-white hidden">
                    0
                </span>
            </a>
        </div>

        <button id="mobileMenuBtn" class="md:hidden text-secondaryPalette p-2 focus:outline-none" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div id="mobileMenuDrawer" class="hidden md:hidden border-t border-stone-100 bg-white px-6 py-4 space-y-4 font-medium shadow-inner animate-fadeIn">
            <a href="home.html" class="block text-stone-600 hover:text-thirdPalette py-2">Home</a>
            <a href="about.html" class="block text-stone-600 hover:text-thirdPalette py-2 border-t border-stone-50/50">About us</a>
            <a href="contact.html" class="block text-stone-600 hover:text-thirdPalette py-2 border-t border-stone-50/50">Find Us</a>

            <div class="pt-4 border-t border-stone-100 flex flex-col gap-3">
                <a href="login.html" class="text-center text-secondaryPalette py-2 hover:text-thirdPalette transition-colors border border-stone-200 rounded-md">Login</a>
                <a href="cart.html" class="text-center bg-thirdPalette text-white py-2 rounded-md"><i class="fa-solid fa-basket-shopping mr-2"></i>View Cart</a>
            </div>
        </div>

    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-6 md:px-12 py-12">
        <div class="text-center space-y-4 mb-12">
            <span class="inline-block bg-amber-100 text-amber-800 text-xs tracking-widest uppercase font-semibold px-3 py-1 rounded-full">
                Handcrafted & Freshly Baked Daily
            </span>

            <h1 class="text-4xl md:text-5xl font-bold font-customFont text-secondaryPalette">
                Explore Our <span class="text-thirdPalette italic">Menu</span>
            </h1>

            <p class="max-w-2xl mx-auto text-stone-600 text-sm md:text-base">
                Browse our selection of wild-fermented crusty sourdough loaves, 
                rich layered cakes, and golden pastries prepped fresh every morning by our 
                very own expert bakers.
            </p>
        </div>

    </main>
    
</body>
</html>
