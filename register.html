<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeBox | Register Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primaryPallete: '#FDFBF7',
                        secondaryPallete: '#2D221E',
                        thirdPallete: '#D97706',
                    },
                    fontFamily: {
                      customFont: ['Georgia', 'Times New Roman', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-primaryPallete font-customFont min-h-screen flex items-center justify-center p-4 select-none">
    <div class="bg-white/70 backdrop-blur-md border border-white/30 p-8 rounded-2xl shadow-xl w-full max-w-md transition-all duration-300">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-secondaryPallete tracking-tight">Join <span class="text-thirdPallete">BakeBox</span></h1>
            <p class="text-sm text-secondaryPallete/70 mt-2 font-sans font-medium">Create an account to order fresh artisan bakes</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label for="fullName" class="block text-sm font-semibold text-secondaryPallete mb-1">Enter Your Name</label>
                <input type="text" id="fullName" class="w-full font-sans px-4 py-2.5 rounded-lg border border-secondaryPallete/20 bg-white/50 focus:outline-none focus:border-thirdPallete focus:ring-1 focus:ring-thirdPallete text-secondaryPallete transition" placeholder="John Doe" required>
                
            </div>
        </form>

    </div>
    
</body>
</html>
